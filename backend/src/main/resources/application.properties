spring.application.name=backend

# Database Configuration
# By default, use in-memory H2 database for zero-config local development.
# If environment variables are provided (e.g. in staging/production), it will use them (e.g., MySQL).
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:careerforge;DB_CLOSE_DELAY=-1;MODE=MySQL}
spring.datasource.driverClassName=${SPRING_DATASOURCE_DRIVER:org.h2.Driver}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.jpa.database-platform=${SPRING_JPA_PLATFORM:org.hibernate.dialect.H2Dialect}

# H2 Console configuration for local development
spring.h2.console.enabled=${SPRING_H2_CONSOLE_ENABLED:true}
spring.h2.console.path=/h2-console

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# JWT Secret (In production, load this from environment variables)
jwt.secret=${JWT_SECRET:7d6c5b4a3928170f6e5d4c3b2a19087f6e5d4c3b2a19087f6e5d4c3b2a19087f}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Server Port
server.port=${PORT:8080}

# Groq API Key
groq.api.key=${GROQ_API_KEY}
